<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">ProjectForge terminal scaffold walkthrough</title>
  <desc id="desc">A terminal shows a Python CLI scaffold moving from routing through provider phases to verified Project Ready evidence.</desc>
  <rect width="1200" height="675" rx="24" fill="#0b0f1d"/>
  <rect x="24" y="24" width="1152" height="627" rx="16" fill="#12172b" stroke="#2d365c" stroke-width="2"/>
  <circle cx="58" cy="58" r="8" fill="#d768d2"/><circle cx="84" cy="58" r="8" fill="#f3bb58"/><circle cx="110" cy="58" r="8" fill="#75dce6"/>
  <text x="600" y="64" text-anchor="middle" fill="#8893b3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">projectforge — verified scaffold</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">
    <text x="58" y="112" fill="#75dce6">$</text>
    <text x="84" y="112" fill="#f7f9ff">forge --name hello-forge --stack python-cli --verify</text>
    <text x="58" y="158" fill="#a16efa" font-weight="700">FORGE</text>
    <text x="140" y="158" fill="#8893b3">conventions in · verified project out</text>

    <rect x="54" y="187" width="1092" height="104" rx="10" fill="#0b0f1d" stroke="#75dce6"/>
    <text x="76" y="217" fill="#75dce6" font-weight="700">Scaffold Context</text>
    <text x="76" y="250" fill="#c6cee6">Python CLI · safe mode · demo-ready · verification enabled</text>
    <text x="76" y="276" fill="#8893b3">Convention sources and hashes recorded in .forge/scaffold.json</text>

    <rect x="54" y="315" width="1092" height="132" rx="10" fill="#0b0f1d" stroke="#a16efa"/>
    <text x="76" y="346" fill="#a16efa" font-weight="700">Phase timeline</text>
    <text x="76" y="382" fill="#75dce6">✓</text><text x="108" y="382" fill="#f7f9ff">Architecture &amp; Core</text><text x="430" y="382" fill="#8893b3">Claude</text>
    <text x="76" y="414" fill="#75dce6">✓</text><text x="108" y="414" fill="#f7f9ff">Tests &amp; Automation</text><text x="430" y="414" fill="#8893b3">Codex</text>
    <text x="610" y="382" fill="#75dce6">✓</text><text x="642" y="382" fill="#f7f9ff">Verify &amp; Fix</text><text x="850" y="382" fill="#8893b3">Claude</text>

    <g>
      <animate attributeName="opacity" values="0.45;1;1" keyTimes="0;0.35;1" dur="4s" repeatCount="indefinite"/>
      <rect x="54" y="471" width="1092" height="132" rx="10" fill="#101d25" stroke="#75dce6" stroke-width="2"/>
      <text x="76" y="506" fill="#75dce6" font-size="25" font-weight="700">Project Ready</text>
      <text x="76" y="542" fill="#f7f9ff">Install, lint, typecheck, tests, and smoke checks passed.</text>
      <text x="76" y="574" fill="#8893b3">Evidence: .forge/scaffold.json · .forge/verification.json</text>
    </g>
    <text x="58" y="632" fill="#8893b3" font-size="15">Illustrated from the maintained terminal-demo flow; provider runtime and output vary.</text>
  </g>
</svg>
