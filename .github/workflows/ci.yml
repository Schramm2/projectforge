name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run public-safety scan
        run: uv run python scripts/scan_safety.py

      - name: Check documentation links
        run: uv run python scripts/check_docs.py

      - name: Validate Forge operator skill
        run: uv run python scripts/validate_forge_skill.py

      - name: Lint
        run: uv run ruff check src/projectforge tests

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: Inspect package artifacts
        run: uv run python scripts/inspect_artifacts.py

      - name: Verify installed package as a clean user
        run: >-
          uv run python scripts/clean_user_harness.py verify
          --wheel dist/matt_projectforge-*.whl
